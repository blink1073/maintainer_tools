name: Release
description: Bumps version, updates changelog, and creates GitHub release

inputs:
  version:
    required: true
    # See https://python-poetry.org/docs/cli/#version for a description of version types.
    description: "Version to release: a version number (e.g. 1.0.0rc4) or one of: patch, minor, major, prepatch, preminor, premajor, prerelease"
  dry_run:
    required: false
    default: "false"
    description: "Dry run: creates a draft release then deletes it, does not push"
  app_id:
    required: false
    default: ""
    description: "GitHub App ID for authenticated pushes (not required for dry_run)"
  app_private_key:
    required: false
    default: ""
    description: "GitHub App private key (not required for dry_run)"
  changelog_body:
    required: false
    default: ""
    description: "Custom changelog body to use instead of the auto-generated one"
  ref:
    required: true
    description: "Branch to push commits back to (when not dry_run)"

outputs:
  tag:
    description: "The release tag created (e.g. v0.3.5)"
    value: ${{ steps.set-tag.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Validate version input
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        VALID_BUMPS="patch minor major prepatch preminor premajor prerelease"
        if echo "$VALID_BUMPS" | grep -qw "$VERSION"; then
          echo "Version bump type: $VERSION"
        elif echo "$VERSION" | grep -qP '^\d+\.\d+\.\d+'; then
          echo "Version string: $VERSION"
        else
          echo "Error: '$VERSION' is not a valid version. Must be a version number (e.g. 1.0.0rc4) or one of: $VALID_BUMPS"
          exit 1
        fi

    - name: Set environment variables and bash defaults
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        DRY_RUN: ${{ inputs.dry_run }}
        REF: ${{ inputs.ref }}
        SHA: ${{ github.sha }}
        REPOSITORY: ${{ github.repository }}
      run: |
        echo "::group::Commands"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        echo "DRY_RUN=$DRY_RUN" >> "$GITHUB_ENV"
        echo "REF=$REF" >> "$GITHUB_ENV"
        echo "SHA=$SHA" >> "$GITHUB_ENV"
        echo "REPOSITORY=$REPOSITORY" >> "$GITHUB_ENV"
        echo "set -eux" > "$RUNNER_TEMP/bash_env"
        echo "BASH_ENV=$RUNNER_TEMP/bash_env" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: Generate token for GitHub push
      uses: actions/create-github-app-token@v2
      id: create-app-token
      if: inputs.app_id != ''
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}
        permission-contents: write

    - name: Set auth token
      id: app-token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.create-app-token.outputs.token }}
      run: echo "token=${APP_TOKEN:-${{ github.token }}}" >> $GITHUB_OUTPUT

    - name: Configure git
      shell: bash
      env:
        TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        echo "::group::Commands"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}"
        echo "::endgroup::"

    - name: Set IS_PRERELEASE and FROM_TAG
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        IS_PRERELEASE=$(python3 "$GITHUB_ACTION_PATH/detect_prerelease.py" "$VERSION")
        echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
        if [ "$IS_PRERELEASE" = "true" ]; then
          FROM_TAG=$(gh api "repos/$REPOSITORY/releases" \
            --jq '[.[] | select(.draft == false)] | first | .tag_name // ""')
        else
          FROM_TAG=$(gh api "repos/$REPOSITORY/releases" \
            --jq '[.[] | select(.draft == false and .prerelease == false)] | first | .tag_name // ""')
        fi
        echo "FROM_TAG=$FROM_TAG" >> "$GITHUB_ENV"

    - name: Generate changelog
      id: changelog
      if: inputs.changelog_body == ''
      uses: mikepenz/release-changelog-builder-action@a34a8009a9588bb86b02a873cf592440e96a5da8  # v6.1.1
      with:
        toTag: "HEAD"
        fromTag: ${{ env.FROM_TAG }}
        ignorePreReleases: "true"
        token: ${{ steps.app-token.outputs.token }}
        configurationJson: |
          {
            "template": "#{{CHANGELOG}}\n",
            "categories": [
              {
                  "title": "## Enhancements Made",
                  "labels": ["enhancement"]
              },
              {
                  "title": "## Bugs Fixed",
                  "labels": ["bug"]
              },
              {
                  "title": "## Documentation improvements",
                  "labels": ["documentation"]
              },
              {
                  "title": "## Maintenance and upkeep improvements",
                  "labels": ["maintenance"]
              },
              {
                  "title": "## Dependency updates",
                  "labels": ["dependencies"]
              }
            ]
          }

    - name: Set release version
      shell: bash
      run: |
        echo "::group::Commands"
        poetry version "$VERSION"
        echo "VERSION=$(poetry version --short)" >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: Resolve IS_PRERELEASE
      shell: bash
      run: |
        IS_PRERELEASE=$(python3 "$GITHUB_ACTION_PATH/detect_prerelease.py" "$VERSION")
        echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"

    - name: Handle changelog
      shell: bash
      env:
        CHANGELOG_BODY: ${{ inputs.changelog_body != '' && inputs.changelog_body || steps.changelog.outputs.changelog }}
      run: |
        echo "::group::Commands"
        python3 "$GITHUB_ACTION_PATH/update_changelog.py"
        echo "## ${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "${CHANGELOG_BODY}" >> $GITHUB_STEP_SUMMARY
        pipx run mdformat CHANGELOG.md
        echo "::endgroup::"

    - name: Commit release changes
      shell: bash
      run: |
        echo "::group::Commands"
        git add pyproject.toml CHANGELOG.md
        git commit -m "Release $VERSION"
        if [ "$DRY_RUN" = "true" ]; then
          echo "Not pushing changes"
        else
          git push origin "HEAD:$REF"
        fi
        echo "::endgroup::"

    - name: Create GitHub release
      id: create-release
      if: inputs.app_id != ''
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        CHANGELOG_BODY: ${{ inputs.changelog_body != '' && inputs.changelog_body || steps.changelog.outputs.changelog }}
      run: |
        echo "::group::Commands"
        if [ "$DRY_RUN" = "true" ]; then
          TARGET="$SHA"
          DRAFT="--draft"
        else
          TARGET="$REF"
          DRAFT=""
        fi
        IS_DRAFT=false
        if [ -n "$DRAFT" ]; then
          IS_DRAFT=true
        fi
        RELEASE_ID=$(gh api "repos/$REPOSITORY/releases" \
          -f tag_name="v$VERSION" \
          -f name="$VERSION" \
          -f body="$CHANGELOG_BODY" \
          -f target_commitish="$TARGET" \
          -F draft=$IS_DRAFT \
          -F prerelease=$IS_PRERELEASE \
          --jq '.id')
        if [ "$IS_DRAFT" = "true" ]; then
          gh api -X DELETE "repos/$REPOSITORY/releases/$RELEASE_ID"
        fi
        echo "::endgroup::"

    - name: Set tag output
      id: set-tag
      shell: bash
      run: |
        if [ "$DRY_RUN" = "true" ]; then
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"
        else
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
        fi

    - name: Bump to dev version
      shell: bash
      run: |
        echo "::group::Commands"
        DEV_VERSION=$(python3 "$GITHUB_ACTION_PATH/bump_dev.py" "$VERSION")
        poetry version "$DEV_VERSION"
        echo "VERSION=$(poetry version --short)" >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: Commit dev version bump
      shell: bash
      run: |
        echo "::group::Commands"
        git add pyproject.toml
        if git diff --staged --quiet; then
          echo "No version bump needed (already a pre-release version: $VERSION)"
        else
          git commit -m "Back to dev: $VERSION"
          if [ "$DRY_RUN" = "true" ]; then
            echo "Not pushing changes"
          else
            git push origin "HEAD:$REF"
          fi
        fi
        printf "\n\n## Post version: %s\n" "${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "::endgroup::"
