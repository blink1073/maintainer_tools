name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'schedule' || github.repository == 'Calysto/maintainer_tools'
    name: Build and Inspect Package
    runs-on: ubuntu-latest
    outputs:
      supported_python_classifiers_json_array: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516  # v2.14.0
        id: baipp

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [build]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.build.outputs.supported_python_classifiers_json_array) }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./actions/base-setup
        with:
          python-version: ${{ matrix.python-version }}
      - run: just test -v

  test_sdist:
    name: Test SDist
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./actions/base-setup
      - uses: ./actions/test-sdist

  test_minimum_versions:
    if: github.event_name != 'schedule' || github.repository == 'Calysto/maintainer_tools'
    name: Test Minimum Versions
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./actions/base-setup
      - uses: ./actions/test-minimum-versions

  test_release:
    name: Test Release (Dry Run)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./actions/base-setup
      - uses: ./actions/release
        with:
          version: patch
          dry_run: "true"
          ref: ${{ github.head_ref }}

  test_scripts:
    if: github.event_name != 'schedule' || github.repository == 'Calysto/maintainer_tools'
    name: Test Release Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Test detect_prerelease.py
        run: bash actions/release/test_detect_prerelease.sh
      - name: Test update_changelog.py
        run: bash actions/release/test_update_changelog.sh

  static:
    if: github.event_name != 'schedule' || github.repository == 'Calysto/maintainer_tools'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./actions/base-setup
      - run: just pre-commit --hook-stage=manual

  tests_check:
    if: always() && (github.event_name != 'schedule' || github.repository == 'Calysto/maintainer_tools')
    needs:
      - build
      - test
      - test_sdist
      - test_minimum_versions
      - test_release
      - test_scripts
      - static
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: test_release
          jobs: ${{ toJSON(needs) }}
