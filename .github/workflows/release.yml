name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release: a version number (e.g. 1.0.0rc4) or one of: patch, minor, major, prepatch, preminor, premajor, prerelease"
        required: true
        type: string
      dry_run:
        description: "Dry run (deletes draft release, does not push changes, does not publish to PyPI)"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 9 * * *"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./actions/release
        id: release
        with:
          version: ${{ github.event_name == 'schedule' && '10.10.10.10' || inputs.version }}
          dry_run: ${{ github.event_name == 'schedule' && 'true' || inputs.dry_run }}
          app_id: ${{ vars.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          ref: ${{ github.ref_name }}

  # Build the package from the release tag so the artifact matches what was released.
  build-package:
    name: Build & verify package
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0

  publish:
    needs: [build-package]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download packages built by build-and-inspect-python-package
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: Packages
          path: dist

      - name: Upload package to Test PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: ${{ inputs.dry_run }}
          verbose: ${{ inputs.dry_run }}

      - name: Upload package to PyPI
        if: ${{ !inputs.dry_run && github.event_name != 'schedule' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          attestations: false

  update-v1-tag:
    needs: [publish, release]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    # Only run for stable releases (version contains no letters, e.g. 1.0.0 not 1.0.0a1)
    if: |
      ${{ !inputs.dry_run && github.event_name != 'schedule' &&
          !contains(needs.release.outputs.tag, 'a') &&
          !contains(needs.release.outputs.tag, 'b') &&
          !contains(needs.release.outputs.tag, 'rc') &&
          !contains(needs.release.outputs.tag, 'dev') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate token
        uses: actions/create-github-app-token@v2
        id: create-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Configure git
        env:
          TOKEN: ${{ steps.create-app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}"

      - name: Update v1 tag
        run: |
          git tag -d v1 || true
          git push origin :refs/tags/v1 || true
          git tag v1
          git push origin v1
